<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COD-IV — Estuda o código e a mecânica</title>
<meta name="description" content="COD-IV — plataforma de estudo rápido para o exame de condução: código da estrada e mecânica.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <span class="brand">COD<span class="brand-accent">-IV</span></span>
    <div class="topbar-actions">
      <span id="user-greeting" class="user-greeting hidden"></span>
      <button id="btn-logout" class="btn-ghost hidden">Sair</button>
      <button id="btn-theme" class="btn-icon" title="Alternar tema" aria-label="Alternar tema">🌙</button>
    </div>
  </div>
</header>

<main id="app">

  <!-- ===== VISTA: AUTENTICAÇÃO ===== -->
  <section id="view-auth" class="view">
    <div class="card card-auth">
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Entrar</button>
        <button class="tab-btn" data-tab="cadastro">Criar conta</button>
      </div>

      <form id="form-login" class="tab-panel active" autocomplete="off">
        <h2>Entrar</h2>
        <label>Nome completo
          <input type="text" name="nome_completo" placeholder="Ex: Ivandro Miguel" required>
        </label>
        <label>Password
          <input type="password" name="password" required minlength="6">
        </label>
        <p class="form-error" id="login-error"></p>
        <button type="submit" class="btn-primary">Entrar</button>
      </form>

      <form id="form-cadastro" class="tab-panel" autocomplete="off">
        <h2>Criar conta</h2>
        <label>Primeiro nome
          <input type="text" name="primeiro_nome" required>
        </label>
        <label>Último nome
          <input type="text" name="ultimo_nome" required>
        </label>
        <label>Password
          <input type="password" name="password" required minlength="6">
        </label>
        <p class="form-hint">Mínimo 6 caracteres.</p>
        <p class="form-error" id="cadastro-error"></p>
        <button type="submit" class="btn-primary">Criar conta</button>
      </form>
    </div>
  </section>

  <!-- ===== VISTA: SELEÇÃO DE MATÉRIA E Nº DE PERGUNTAS ===== -->
  <section id="view-config" class="view hidden">
    <div class="card">
      <h2>O que vais estudar hoje?</h2>

      <div class="materia-grid">
        <button class="materia-btn" data-materia="codigo">
          <span class="materia-icon">🚦</span>
          <span>Código</span>
        </button>
        <button class="materia-btn" data-materia="mecanica">
          <span class="materia-icon">🔧</span>
          <span>Mecânica</span>
        </button>
      </div>

      <div id="num-perguntas-wrap" class="hidden">
        <h3>Quantas perguntas?</h3>
        <div class="num-grid">
          <button class="num-btn" data-num="10">10</button>
          <button class="num-btn" data-num="15">15</button>
          <button class="num-btn" data-num="20">20</button>
          <button class="num-btn" data-num="50">50</button>
        </div>
        <p class="tempo-info" id="tempo-info"></p>
        <p class="form-error" id="config-error"></p>
        <button id="btn-iniciar-quiz" class="btn-primary btn-block" disabled>Iniciar quiz</button>
      </div>
    </div>

    <section class="card feedback-card" aria-labelledby="feedback-title">
      <h2 id="feedback-title">Ajuda-nos a melhorar</h2>
      <p>Encontraste um erro, falta uma peça, um sinal ou tens uma sugestão? Envia o teu feedback.</p>
      <form id="form-feedback">
        <label for="feedback-mensagem">Sugestão de melhoria</label>
        <textarea id="feedback-mensagem" name="mensagem" minlength="10" maxlength="1500" required placeholder="Escreve aqui a tua sugestão..."></textarea>
        <p id="feedback-status" class="form-hint" aria-live="polite"></p>
        <button type="submit" class="btn-ghost">Enviar feedback</button>
      </form>
    </section>
  </section>

  <!-- ===== VISTA: QUIZ ===== -->
  <section id="view-quiz" class="view hidden">
    <div class="quiz-header">
      <div class="quiz-progress">
        <span id="quiz-progress-text">Pergunta 1 de 10</span>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      </div>
      <div id="quiz-timer" class="quiz-timer">15:00</div>
    </div>

    <div class="card card-quiz">
      <p id="quiz-enunciado" class="quiz-enunciado"></p>
      <img id="quiz-imagem" class="quiz-imagem hidden" alt="Imagem da pergunta">

      <div id="quiz-opcoes" class="quiz-opcoes"></div>

      <div class="quiz-nav">
        <button id="btn-anterior" class="btn-ghost">← Anterior</button>
        <button id="btn-saltar" class="btn-ghost">Saltar pergunta</button>
        <button id="btn-seguinte" class="btn-primary">Seguinte →</button>
      </div>
    </div>

    <div class="quiz-mapa" id="quiz-mapa"></div>

    <button id="btn-finalizar" class="btn-primary btn-block btn-finalizar hidden">Finalizar quiz</button>
  </section>

  <!-- ===== VISTA: RESULTADOS ===== -->
  <section id="view-resultados" class="view hidden">
    <div class="card resultado-resumo">
      <h2>Resultados</h2>
      <div class="resultado-score">
        <div class="score-item score-certas">
          <span id="score-certas" class="score-num">0</span>
          <span>certas</span>
        </div>
        <div class="score-item score-erradas">
          <span id="score-erradas" class="score-num">0</span>
          <span>erradas</span>
        </div>
      </div>
      <button id="btn-novo-quiz" class="btn-primary btn-block">Fazer outro quiz</button>
    </div>

    <div id="lista-resultados" class="lista-resultados"></div>
  </section>

</main>

<script src="js/app.js"></script>
</body>
</html>
